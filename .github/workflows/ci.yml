name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install isort ruff

    - name: Check import sorting with isort
      run: isort --check-only --diff .

    - name: Lint with Ruff
      run: ruff check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Run tests with coverage
      run: |
        pytest --cov=services --cov=data --cov-report=xml --cov-report=term-missing

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: github.event_name == 'pull_request'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API service
      run: docker build -f services/api/Dockerfile -t driftwatch-api:test .

    - name: Build training service
      run: docker build -f services/training/Dockerfile -t driftwatch-training:test .

    - name: Build monitoring service
      run: docker build -f services/monitoring/Dockerfile -t driftwatch-monitoring:test .

    - name: Build control plane service
      run: docker build -f services/control_plane/Dockerfile -t driftwatch-control-plane:test .

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create required directories
      run: |
        mkdir -p shared/data shared/reports shared/events

    - name: Install data generator dependencies
      run: pip install pyyaml numpy pandas structlog

    - name: Generate base data
      run: |
        python data/generator/generate.py \
          --config data/generator/config/base.yaml \
          --out shared/data/reference.csv

    - name: Start MLflow
      run: docker compose up -d mlflow

    - name: Wait for MLflow
      run: |
        timeout 60 bash -c 'until curl -sf http://localhost:5000/health; do sleep 2; done'

    - name: Train initial model
      run: |
        docker compose --profile jobs run --rm \
          -e MLFLOW_TRACKING_URI=http://mlflow:5000 \
          training python services/training/train.py --reference /app/shared/data/reference.csv

    - name: Check MLflow model registration
      run: |
        response=$(curl -s http://localhost:5000/api/2.0/mlflow/registered-models/list)
        echo "MLflow response: $response"
        echo "$response" | grep -q '"name"' && echo "Model registered successfully" || echo "No models registered yet"

    - name: Shutdown services
      run: docker compose down -v
